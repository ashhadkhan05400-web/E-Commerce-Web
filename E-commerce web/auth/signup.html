<div class="auth-wrap">
  <div class="auth-card">
    <h2 class="auth-title">Create Account</h2>
    <p class="auth-sub">Join Ralph Lauren for early access to new drops.</p>

    <form class="auth-form">
      <div class="auth-row">
        <div class="auth-field">
          <label for="firstName">First name</label>
          <input type="text" id="firstName" name="firstName" placeholder="Jordan">
        </div>
        <div class="auth-field">
          <label for="lastName">Last name</label>
          <input type="text" id="lastName" name="lastName" placeholder="Smith">
        </div>
      </div>

      <div class="auth-field">
        <label for="signupEmail">Email</label>
        <input  id="signupEmail" name="email" placeholder="you@example.com">
      </div>

      <div class="auth-field">
        <label for="signupPassword">Password</label>
        <input type="password" id="signupPassword" name="password" placeholder="At least 8 characters">
      </div>

      <div class="auth-field">
        <label for="confirmPassword">Confirm password</label>
        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Re-enter password">
      </div>

      <div class="auth-check">
        <input type="checkbox" id="terms" name="terms">
        <label for="terms">I agree to the Terms of Service and Privacy Policy</label>
      </div>

      <button type="submit" id="btn-signup" class="auth-btn">Sign Up</button>
    </form>

    <div class="auth-divider"><span>or</span></div>

    <button type="button" class="auth-btn-outline">Continue with Google</button>

    <p class="auth-footer-link">Already have an account? <a style="text-decoration: none;" href="login.html">Log in</a></p>
  </div>
</div>
