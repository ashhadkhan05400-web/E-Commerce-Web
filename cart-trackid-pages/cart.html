    <!-- Cart Content Layout -->
    <div class="container cart-wrapper">
        <h2 class="cart-title">Shopping Cart</h2>
        <div class="row g-5">
            <div class="col-lg-8">
                <div class="cart-item">
                    <div class="item-details">
                        <img src="./imgs/c1.jpg" class="item-img" alt="Polo shirt">
                        <div class="item-info">
                            <h4>Elegant beige polo</h4>
                            <p>Size: M</p>
                        </div>
                    </div>
                    <div class="qty-control">
                        <button class="qty-btn">-</button>
                        <input type="text" class="qty-input" value="1" readonly>
                        <button class="qty-btn">+</button>
                    </div>
                    <div class="item-price-remove">
                        <div class="item-price">Rs. 4,500</div>
                        <button class="btn-remove">Remove</button>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="summary-card">
                    <div class="summary-heading">Summary</div>
                    <div class="summary-row"><span>Subtotal</span><span>Rs. 4,500</span></div>
                    <div class="summary-row"><span>Shipping</span><span>Rs. 200</span></div>
                    <div class="summary-total"><span>Total</span><span>Rs. 4,700</span></div>
                  <a href="track.html"> <button  class="btn-buy w-100 mt-4" style="padding: 12px 0;">Proceed to Checkout</button></a> 
                </div>
            </div>
        </div>
    </div>
